<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Polla Mundialista 2026</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <h1>⚽ Polla Mundialista 2026</h1>
    <p>Registra tus predicciones, compite con tus amigos y sube en el ranking.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Partidos</h2>
      <div id="partidosContainer">
        <p>Cargando partidos...</p>
      </div>
    </section>

    <section class="card">
      <h2>Ranking simulado</h2>
      <div id="rankingContainer">
        <ol>
          <li>Mak FC - 15 puntos</li>
          <li>Chelita United - 12 puntos</li>
          <li>Marce Club - 10 puntos</li>
        </ol>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
